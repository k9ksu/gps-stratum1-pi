# GPS reference clocks for chrony.
#
# NMEA: coarse time from gpsd via NTP shared-memory segment 0. `noselect` means
#       it is never chosen as the time source directly — it only supplies the
#       whole-second so PPS knows which second its pulse belongs to.
# PPS : the precise sub-second edge from the GPIO PPS pin (/dev/pps-gps, created
#       by 99-pps-gps.rules). `lock NMEA` ties it to the NMEA second above.
#
# chrony has no native NMEA parser, so gpsd is required for the coarse second.
refclock SHM 0 refid NMEA precision 1e-1 offset 0.0 delay 0.2 noselect
refclock PPS /dev/pps-gps lock NMEA refid PPS
